name: Build LaTeX and Deploy to Website

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Create website files
        run: |
          mkdir -p _site
          cp main.pdf _site/
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Wall Analysis</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: sans-serif; background: #f5f5f5; }
              .header {
                background: #2c3e50; color: white; padding: 15px 20px;
                display: flex; justify-content: space-between; align-items: center;
              }
              .header h1 { font-size: 1.2rem; }
              .header a {
                color: white; background: #3498db; padding: 8px 16px;
                border-radius: 5px; text-decoration: none; font-size: 0.9rem;
              }
              .header a:hover { background: #2980b9; }
              iframe {
                width: 100%; height: calc(100vh - 60px); border: none;
              }
            </style>
          </head>
          <body>
            <div class="header">
              <h1>Wall Analysis</h1>
              <a href="main.pdf" download>Download PDF</a>
            </div>
            <iframe src="main.pdf"></iframe>
          </body>
          </html>
          HTMLEOF

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
