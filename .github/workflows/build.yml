name: Build LaTeX and Deploy to Website

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Create website files
        run: |
          mkdir -p _site
          cp main.pdf _site/
          cp graphs_only.html _site/charts.html
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
            <title>Zac's Climbing Wall Analysis</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                background: #f5f1eb;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 1.5rem;
              }
              .container {
                max-width: 500px;
                width: 100%;
                background: white;
                border-radius: 24px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                padding: 2rem 1.5rem;
                text-align: center;
              }
              h1 {
                font-size: 1.8rem;
                font-weight: 600;
                color: #1a2e3f;
                margin-bottom: 0.25rem;
              }
              .subhead {
                color: #5f6b7a;
                font-size: 0.9rem;
                margin-bottom: 2rem;
                border-bottom: 1px solid #e0d9d0;
                padding-bottom: 1rem;
              }
              .card {
                background: #f8f6f2;
                border-radius: 16px;
                padding: 1.5rem 1rem;
                margin-bottom: 1.2rem;
                transition: all 0.2s;
                border: 1px solid #e0d9d0;
              }
              .card:last-child { margin-bottom: 0; }
              .card:hover { background: #f0ebe4; }
              .btn {
                display: inline-block;
                width: 100%;
                padding: 1rem;
                border-radius: 12px;
                font-weight: 600;
                font-size: 1.1rem;
                text-decoration: none;
                color: white;
                background: #2b4a6f;
                border: none;
                cursor: pointer;
                transition: background 0.2s;
                margin-top: 1rem;
              }
              .btn:hover { background: #1f3a55; }
              .btn.download { background: #2b4a6f; }
              .btn.charts { background: #5f4c3b; }
              .btn.charts:hover { background: #4e3e2f; }
              .icon { font-size: 2rem; margin-bottom: 0.5rem; }
              .note {
                font-size: 0.75rem;
                color: #8e9aab;
                margin-top: 2rem;
              }
              @media (max-width: 400px) {
                .container { padding: 1.5rem 1rem; }
                h1 { font-size: 1.5rem; }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Zac's Climbing Wall</h1>
              <div class="subhead">Engineering estimate · Not a professional inspection</div>
              
              <div class="card">
                <div class="icon">📄</div>
                <div style="font-weight: 600; margin-bottom: 0.2rem;">Full Report</div>
                <div style="font-size: 0.9rem; color: #5f6b7a;">Static analysis, bending checks, anchor ratings</div>
                <a href="main.pdf" download="Zac_Climbing_Wall_Report.pdf" class="btn download">⬇ Download PDF</a>
              </div>
              
              <div class="card">
                <div class="icon">📊</div>
                <div style="font-weight: 600; margin-bottom: 0.2rem;">Interactive Charts</div>
                <div style="font-size: 0.9rem; color: #5f6b7a;">Adjust sliders, see real‑time forces</div>
                <a href="charts.html" class="btn charts">📈 Open Interactive Tool</a>
              </div>
              
              <div class="note">
                The PDF will download automatically when you click the button.<br>
                Mobile‑friendly charts open in this tab.
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
