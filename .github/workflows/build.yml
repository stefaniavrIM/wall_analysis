name: Build LaTeX and Deploy to Website

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Create website files
        run: |
          mkdir -p _site
          cp main.pdf _site/
          cp graphs_only.html _site/charts.html
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Zac's Climbing Wall Analysis</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f1eb; }
              .tab-bar { display: flex; background: #1a1610; }
              .tab { padding: 12px 24px; color: #a09888; font-size: 0.95rem; cursor: pointer; border: none; background: none; font-family: inherit; transition: all 0.2s; border-bottom: 3px solid transparent; }
              .tab:hover { color: #d4cdc2; }
              .tab.active { color: #fff; border-bottom-color: #2b4a6f; }
              iframe { width: 100%; height: calc(100vh - 47px); border: none; }
              .view { display: none; }
              .view.active { display: block; }
            </style>
          </head>
          <body>
            <div class="tab-bar">
              <button class="tab active" onclick="showTab('report')">Report (PDF)</button>
              <button class="tab" onclick="showTab('charts')">Interactive Charts</button>
            </div>
            <div id="report" class="view active">
              <iframe src="main.pdf"></iframe>
            </div>
            <div id="charts" class="view">
              <iframe src="charts.html"></iframe>
            </div>
            <script>
              function showTab(name) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById(name).classList.add('active');
                event.target.classList.add('active');
              }
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
