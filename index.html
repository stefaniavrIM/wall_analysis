<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zac's Climbing Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #16425B;
      --cream: #F8F6F1;
      --ink: #1A1A2E;
      --rule: #C9BFA8;
      --subtle: #6B7280;
      --bg: #fdfcf9;
      --tab-h: 38px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .topbar {
      height: var(--tab-h);
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0;
      position: relative;
      z-index: 10;
    }

    .topbar-title {
      font-family: 'DM Serif Display', serif;
      color: var(--cream);
      font-size: 0.88rem;
      font-weight: 400;
      white-space: nowrap;
      margin-right: 1.2rem;
      opacity: 0.9;
    }

    .tab-group {
      display: flex;
      gap: 2px;
      height: 100%;
      align-items: flex-end;
    }

    .tab {
      padding: 0.35rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: rgba(255,255,255,0.55);
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 5px 5px 0 0;
      transition: all 0.2s;
      position: relative;
      bottom: 0;
    }

    .tab:hover {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.06);
    }

    .tab.active {
      color: var(--ink);
      background: var(--bg);
    }

    .tab-icon {
      margin-right: 0.35rem;
      font-size: 0.85rem;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .disclaimer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .dl-btn {
      padding: 0.2rem 0.55rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--cream);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .dl-btn:hover {
      background: white;
    }

    .panel-wrap {
      height: calc(100vh - var(--tab-h));
      position: relative;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .panel.active {
      display: block;
    }

    .pdf-embed {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 640px) {
      :root { --tab-h: 36px; }
      .topbar { padding: 0 0.6rem; }
      .topbar-title { font-size: 0.78rem; margin-right: 0.6rem; }
      .tab { padding: 0.3rem 0.7rem; font-size: 0.68rem; }
      .disclaimer { display: none; }
      .dl-btn { font-size: 0.6rem; padding: 0.2rem 0.45rem; }
    }

    @media (max-width: 380px) {
      .topbar-title { font-size: 0.72rem; margin-right: 0.4rem; }
      .tab { padding: 0.25rem 0.5rem; font-size: 0.64rem; }
      .tab-icon { display: none; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-title">Zac's Climbing Wall</div>
    <div class="tab-group">
      <button class="tab active" data-panel="report" onclick="switchTab('report')">
        <span class="tab-icon">📄</span>Report
      </button>
      <button class="tab" data-panel="charts" onclick="switchTab('charts')">
        <span class="tab-icon">📊</span>Charts
      </button>
    </div>
    <div class="topbar-right">
      <span class="disclaimer">Engineering estimate only · See Section 9 for limitations</span>
      <a href="main.pdf" download="Zac_Climbing_Wall_Report.pdf" class="dl-btn">⬇ PDF</a>
    </div>
  </div>

  <div class="panel-wrap">
    <div class="panel active" id="panel-report">
      <iframe class="pdf-embed" id="pdf-frame"></iframe>
    </div>

    <div class="panel" id="panel-charts">
      <iframe src="charts.html" loading="lazy" style="width:100%;height:100%;border:none;"></iframe>
    </div>
  </div>

  <script>
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === name));
      document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    }

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === '1') switchTab('report');
      if (e.key === '2') switchTab('charts');
    });

    // Desktop: embed PDF directly. Mobile: use Google Docs viewer.
    const ua = navigator.userAgent;
    const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
    const frame = document.getElementById('pdf-frame');
    const pdfURL = new URL('main.pdf', window.location.href).href;

    if (isMobile) {
      frame.src = 'https://docs.google.com/gview?embedded=true&url=' + encodeURIComponent(pdfURL);
    } else {
      frame.src = 'main.pdf';
    }
  </script>

</body>
</html>
